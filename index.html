<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #999;
            font-size: 1em;
        }

        .selector-group {
            margin-bottom: 30px;
        }

        .selector-group label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 1.1em;
        }

        #character {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 10px;
            background: white;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #character:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }

        #character:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 4px rgba(118, 75, 162, 0.1);
        }

        .character-display {
            text-align: center;
            background: #f8f9ff;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        #characterImage {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
            margin-bottom: 20px;
        }

        #characterImage:hover {
            transform: scale(1.05);
        }

        .character-info {
            text-align: center;
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .character-info.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .character-name {
            color: #333;
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .character-description {
            color: #666;
            font-size: 1em;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-prev {
            background: #667eea;
            color: white;
        }

        .btn-prev:hover {
            background: #5568d3;
            transform: translateX(-2px);
        }

        .btn-next {
            background: #764ba2;
            color: white;
        }

        .btn-next:hover {
            background: #653a8a;
            transform: translateX(2px);
        }

        .counter {
            text-align: center;
            color: #999;
            font-size: 0.9em;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 2em;
            }

            #characterImage {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🐱 Character Viewer</h1>
            <p>Explore your favorite characters</p>
        </div>

        <div class="selector-group">
            <label for="character">Select a Character:</label>
            <select id="character" onchange="changeImage()">
                <option value="garfield">Garfield</option>
                <option value="odie">Odie</option>
                <option value="nermal">Nermal</option>
                <option value="pooky">Pooky</option>
                <option value="jon">Jon</option>
            </select>
        </div>

        <div class="character-display">
            <img id="characterImage" src="images/garfield.jpg" alt="Character">
            <div class="character-info active" id="characterInfo">
                <div class="character-name" id="characterName">Garfield</div>
                <div class="character-description" id="characterDescription">
                    The lazy, orange tabby cat who loves lasagna and hates Mondays.
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-prev" onclick="previousCharacter()">← Previous</button>
            <button class="btn-next" onclick="nextCharacter()">Next →</button>
        </div>

        <div class="counter">
            <span id="counter">1 of 5</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
