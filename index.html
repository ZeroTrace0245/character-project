<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid #ddd;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }

        .header h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 0.9em;
        }

        .selector-group {
            margin-bottom: 20px;
        }

        .selector-group label {
            display: block;
            color: #333;
            font-weight: bold;
            margin-bottom: 8px;
        }

        #character {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            background: #fff;
            color: #333;
            cursor: pointer;
        }

        .character-display {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            background: #fafafa;
        }

        #characterImage {
            max-width: 100%;
            height: auto;
            margin-bottom: 15px;
        }

        .character-info {
            text-align: center;
            padding: 15px;
            background: #fff;
            border: 1px solid #ddd;
            display: none;
        }

        .character-info.active {
            display: block;
        }

        .character-name {
            color: #333;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .character-description {
            color: #666;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            cursor: pointer;
            background: #f9f9f9;
            color: #333;
        }

        .counter {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Characters</h1>
            <p>Select a character</p>
        </div>

        <div class="selector-group">
            <label for="character">Character:</label>
            <select id="character" onchange="changeImage()">
                <option value="garfield">Garfield</option>
                <option value="odie">Odie</option>
                <option value="nermal">Nermal</option>
                <option value="pooky">Pooky</option>
                <option value="jon">Jon</option>
            </select>
        </div>

        <div class="character-display">
            <img id="characterImage" src="images/garfield.jpg" alt="Character">
            <div class="character-info active" id="characterInfo">
                <div class="character-name" id="characterName">Garfield</div>
                <div class="character-description" id="characterDescription">
                    The lazy, orange tabby cat who loves lasagna and hates Mondays.
                </div>
            </div>
        </div>

        <div class="button-group">
            <button onclick="previousCharacter()">Previous</button>
            <button onclick="nextCharacter()">Next</button>
        </div>

        <div class="counter">
            <span id="counter">1 of 5</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
